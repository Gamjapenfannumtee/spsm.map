<!DOCTYPE html>
<html>
<head>
    <title>SPSM Interactive Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        .map-controls { padding: 10px; background: #f8f9fa; }
    </style>
</head>
<body>

<div class="map-controls">
    <h3>แผนที่โรงเรียนสาธิต มศว ประสานมิตร (ฝ่ายมัธยม)</h3>
    <p>เลือกรูปแบบแผนที่และดูสถานที่น่าสนใจ</p>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const spsmCoords = [13.7445, 100.5638];
    const map = L.map('map').setView(spsmCoords, 18);

    const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    });

    const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri'
    });

    streetMap.addTo(map);

    const markers = {
        "อาคารวิทยวิโรฒ": L.marker([13.742792544515027, 100.56567658720772]).bindPopup("<b>อาคารวิทยวิโรฒ</b><br>อาคารเรียนหลักและห้องสมุด"),
        "โรงอาหาร": L.marker([13.743424248388942, 100.56535921423179]).bindPopup("<b>โรงอาหาร</b><br>จุดรวมพลช่วงพักเที่ยง"),
        "สระว่ายน้ำ": L.marker([13.74300028406048, 100.56659152605957]).bindPopup("<b>สระว่ายน้ำ</b>")
    };

    const interestPoints = L.layerGroup(Object.values(markers)).addTo(map);

    const baseMaps = {
        "แผนที่ถนน": streetMap,
        "ดาวเทียม": satelliteMap
    };

    const overlayMaps = {
        "สถานที่น่าสนใจ": interestPoints
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);
</script>
</body>
</html>
